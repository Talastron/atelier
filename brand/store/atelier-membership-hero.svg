<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" width="1600" height="1200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#FBF8F3"/>
      <stop offset="60%" stop-color="#F4EFE6"/>
      <stop offset="100%" stop-color="#ECE5D6"/>
    </radialGradient>
    <linearGradient id="goldLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D4B378" stop-opacity="0"/>
      <stop offset="50%" stop-color="#D4B378" stop-opacity="1"/>
      <stop offset="100%" stop-color="#D4B378" stop-opacity="0"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="10" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1600" height="1200" fill="url(#bg)"/>

  <!-- Inner border frame -->
  <rect x="80" y="80" width="1440" height="1040" fill="none" stroke="#1c1917" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Top corner ornaments -->
  <g stroke="#D4B378" stroke-width="1.2" fill="none" opacity="0.9">
    <path d="M 80 140 L 140 140 L 140 80"/>
    <path d="M 1520 140 L 1460 140 L 1460 80"/>
    <path d="M 80 1060 L 140 1060 L 140 1120"/>
    <path d="M 1520 1060 L 1460 1060 L 1460 1120"/>
  </g>

  <!-- Top eyebrow text -->
  <g font-family="Georgia, 'Times New Roman', serif" fill="#1c1917" text-anchor="middle">
    <text x="800" y="180" font-size="22" letter-spacing="14" font-weight="400" fill-opacity="0.55">E S T  2 0 2 6</text>
  </g>

  <!-- Hanger mark, scaled up and centered -->
  <g transform="translate(640 280) scale(1.25)" filter="url(#softShadow)">
    <rect width="256" height="256" rx="56" fill="#1c1917"/>
    <g fill="none" stroke="#F7F5F2" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 160 60 Q 160 44 144 44 Q 128 44 128 58 L 128 110"/>
      <path d="M 128 110 L 62 184 L 194 184 Z"/>
    </g>
    <line x1="128" y1="184" x2="128" y2="206" stroke="#D4B378" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>
    <circle cx="128" cy="212" r="5" fill="#D4B378"/>
  </g>

  <!-- Wordmark: Atelier -->
  <g font-family="Georgia, 'Times New Roman', serif" fill="#1c1917" text-anchor="middle">
    <text x="800" y="780" font-size="180" font-weight="400" letter-spacing="6">Atelier</text>
  </g>

  <!-- Gold hairline divider -->
  <rect x="500" y="820" width="600" height="1.5" fill="url(#goldLine)"/>
  <circle cx="800" cy="820.75" r="4" fill="#D4B378"/>

  <!-- Membership label -->
  <g font-family="Georgia, 'Times New Roman', serif" fill="#1c1917" text-anchor="middle">
    <text x="800" y="890" font-size="34" letter-spacing="22" font-weight="400" fill-opacity="0.8">M E M B E R S H I P</text>
  </g>

  <!-- Tagline -->
  <g font-family="Georgia, 'Times New Roman', serif" fill="#1c1917" text-anchor="middle">
    <text x="800" y="970" font-size="30" font-style="italic" fill-opacity="0.65">Quiet luxury for your wardrobe.</text>
  </g>

  <!-- Bottom feature row -->
  <g font-family="Georgia, 'Times New Roman', serif" fill="#1c1917" text-anchor="middle" font-size="20" letter-spacing="6" fill-opacity="0.6">
    <text x="430" y="1050">U N L I M I T E D  P I E C E S</text>
    <text x="800" y="1050">A I  S T Y L I N G</text>
    <text x="1170" y="1050">C O S T - P E R - W E A R</text>
  </g>

  <!-- Gold dots between features -->
  <circle cx="615" cy="1043" r="3" fill="#D4B378"/>
  <circle cx="985" cy="1043" r="3" fill="#D4B378"/>
</svg>
